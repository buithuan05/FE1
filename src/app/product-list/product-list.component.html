<div class="mb-3">
  <input
    type="text"
    [(ngModel)]="filterText"
    class="form-control"
    placeholder="Tìm theo tên, giá hoặc ID"
  />
</div>

<table class="table table-striped">
  <thead class="table-dark">
    <tr>
      <th>ID</th>
      <th>Tên sản phẩm</th>
      <th>Giá</th>
      <th>Kho</th>
      <th>Action</th> 
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let product of filterProducts()">
      <td>{{ product.id }}</td>
      <td>{{ product.name }}</td>
      <td>{{ product.price | vnd }}</td>
      <td>
        <span [class.text-success]="product.inStock" [class.text-danger]="!product.inStock">
          {{ product.inStock ? 'Còn hàng' : 'Hết hàng' }}
        </span>
      </td>
      <td>
        <a [routerLink]="['/product', product.id]" class="btn btn-sm btn-primary">
          Chi tiết
        </a>
      </td>
    </tr>
  </tbody>
</table>
